<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Block Website</title>
    <style>
        :root { --main-color: #3498db; --grid-gap: 20px; }
        body { margin: 0; font-family: sans-serif; overflow-x: hidden; }
        
        /* Сетка Zero Block */
        .zero-block {
            position: relative;
            width: 100%;
            height: 100vh; /* Высота экрана */
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Анимация появления */
        .fade-in {
            animation: fadeIn 1.5s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Адаптация под мобильные */
        @media (max-width: 768px) {
            .zero-block { height: auto; padding: 50px 20px; }
            .absolute-element { position: static !important; }
        }
    </style>
</head>
<body>

    <section class="zero-block fade-in">
        <h1 style="position: absolute; top: 30%; left: 5%;">Ваш Будущий Проект</h1>
        <button class="cta-button" style="position: absolute; top: 50%; left: 5%;">Заказать сейчас</button>
    </section>

    <section class="zero-block">
        <h2>Связаться с нами</h2>
        <form id="feedback-form">
            <input type="text" placeholder="Имя" required>
            <input type="email" placeholder="Email" required>
            <textarea placeholder="Ваш запрос"></textarea>
            <button type="submit">Отправить</button>
        </form>
    </section>

</body>
</html>
